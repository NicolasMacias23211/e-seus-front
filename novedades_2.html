<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Gestión de Novedades</title>
  </head>

  <body class="bg-slate-100">
    <div class="max-w-7xl mx-auto p-6">
      <!-- HEADER -->

      <div class="flex justify-between items-center mb-6">
        <div>
          <h1 class="text-3xl font-bold text-slate-800">
            Gestión de Novedades
          </h1>

          <p class="text-slate-500">Vacaciones, permisos e incapacidades</p>
        </div>

        <button
          class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-3 rounded-xl shadow"
        >
          + Nueva novedad
        </button>
      </div>

      <!-- KPI -->

      <div class="mb-6">
        <div
          class="bg-white rounded-2xl shadow p-5 inline-flex gap-4 items-center"
        >
          <div>
            <p class="text-slate-500 text-sm">Solicitudes pendientes</p>

            <h2 class="text-4xl font-bold text-amber-500">12</h2>
          </div>
        </div>
      </div>

      <!-- FILTROS -->

      <div class="bg-white rounded-2xl shadow p-4 mb-6">
        <div class="grid md:grid-cols-4 gap-4">
          <input
            type="text"
            placeholder="Empleado..."
            class="border rounded-xl px-4 py-3"
          />

          <select class="border rounded-xl px-4 py-3">
            <option>Todos los tipos</option>
          </select>

          <select class="border rounded-xl px-4 py-3">
            <option>Todos los estados</option>
          </select>

          <VueDatePicker
            v-model="selectedDates"
            range
            :enable-time-picker="false"
          />
        </div>
      </div>

      <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
        <!-- Tabla -->
        <div class="xl:col-span-2">
          <div class="bg-white rounded-2xl shadow">
            <div class="p-5 border-b">
              <h2 class="font-semibold text-lg">Solicitudes</h2>
            </div>

            <div class="overflow-auto">
              <table class="w-full">
                <thead class="bg-slate-50">
                  <tr class="text-left">
                    <th class="p-4">Empleado</th>
                    <th class="p-4">Tipo</th>
                    <th class="p-4">Fecha Inicio</th>
                    <th class="p-4">Fecha Fin</th>
                    <th class="p-4">Estado</th>
                    <th class="p-4"></th>
                  </tr>
                </thead>

                <tbody>
                  <tr class="border-t">
                    <td class="p-4">Juan Pérez</td>

                    <td class="p-4">Vacaciones</td>

                    <td class="p-4">01/07/2026</td>

                    <td class="p-4">10/07/2026</td>

                    <td class="p-4">
                      <span
                        class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-sm"
                      >
                        Pendiente
                      </span>
                    </td>

                    <td class="p-4">
                      <button class="text-indigo-600 font-medium">Ver</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
        <!-- Calendario -->
        <div class="xl:col-span-1">
          <div class="bg-white rounded-2xl shadow p-5">
            <div class="flex justify-between mb-4">
              <h2 class="font-semibold text-lg">Calendario</h2>

              <span class="text-slate-500"> Julio 2026 </span>
            </div>

            <div class="grid grid-cols-7 gap-2 text-center">
              <div class="font-semibold">L</div>
              <div class="font-semibold">M</div>
              <div class="font-semibold">M</div>
              <div class="font-semibold">J</div>
              <div class="font-semibold">V</div>
              <div class="font-semibold">S</div>
              <div class="font-semibold">D</div>

              <!-- días -->
              <div
                class="h-12 flex items-center justify-center rounded-lg hover:bg-slate-100"
              >
                1
              </div>

              <div
                class="h-12 flex items-center justify-center rounded-lg bg-blue-100 text-blue-700 font-semibold"
              >
                2
              </div>

              <div
                class="h-12 flex items-center justify-center rounded-lg bg-red-100 text-red-700 font-semibold"
              >
                3
              </div>
            </div>

            <div class="mt-5 space-y-2 text-sm">
              <div class="flex items-center gap-2">
                <span class="w-4 h-4 bg-blue-200 rounded"></span>
                Vacaciones
              </div>

              <div class="flex items-center gap-2">
                <span class="w-4 h-4 bg-red-200 rounded"></span>
                Incapacidad
              </div>

              <div class="flex items-center gap-2">
                <span class="w-4 h-4 bg-green-200 rounded"></span>
                Permiso
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
